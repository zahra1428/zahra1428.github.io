<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Berhasil - Variant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="page" style="justify-content: center; align-items: center;">
            <div style="text-align: center;">
                <div style="width: 80px; height: 80px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
                    <span style="font-size: 40px; color: #166534;">&#10003;</span>
                </div>
                
                <h1>Berhasil!</h1>
                <p class="mb-4">Akun Anda telah diverifikasi</p>

                <div class="card" style="text-align: left; margin-bottom: 24px; padding: 20px;">
                    <div style="text-align: center; margin-bottom: 16px;">
                        <div class="avatar avatar-lg" style="margin: 0 auto 12px;">PT</div>
                        <h3>PT Maju Jaya</h3>
                        <p class="text-muted">pemasok@majujaya.com</p>
                    </div>
                    <div class="divider"></div>
                    <div class="flex-between mb-2">
                        <span class="text-muted">Status Akun</span>
                        <span class="badge badge-success">Aktif</span>
                    </div>
                    <div class="flex-between">
                        <span class="text-muted">Verifikasi</span>
                        <span class="badge badge-success">Terverifikasi</span>
                    </div>
                </div>

                <a href="dashboard-pemasok.html" class="btn btn-success mb-2">Lanjutkan ke Dashboard</a>
                <a href="otp.html" class="btn btn-secondary">Verifikasi OTP</a>
            </div>
        </div>
    </div>
</body>
</html>
